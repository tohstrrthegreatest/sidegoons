<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; background: #111; color: white; }

    .bar {
      display: flex;
      width: 400px;
      height: 25px;
      background: #333;
      margin-bottom: 10px;
    }

    .tick {
      flex: 1;
      margin: 1px;
      background: #222;
    }

    .filled { background: red; }
    .incoming { background: orange; }

    button, input { margin: 5px; }
  </style>
</head>

<body>

<h2>HP System</h2>

<div id="hpBar" class="bar"></div>
<p id="hpText"></p>

<button onclick="prevTurn()">⬅ Prev</button>
<button onclick="nextTurn()">Next ➡</button>

<h3>Status Effects</h3>
<div id="effects"></div>

<h4>Add Effect</h4>
<input id="ename" placeholder="Name">
<input id="edmg" type="number" placeholder="Damage">
<input id="edur" type="number" placeholder="Duration">
<button onclick="addEffect()">Add</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔑 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "sidegoons.firebaseapp.com",
  authDomain: "sidegoons",
  projectId: "PASTE_HERE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "game", "state");

let state = {
  maxHp: 100,
  turn: 0,
  effects: []
};

// 🔄 Sync from Firebase
onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    state = snap.data();
    render();
  } else {
    setDoc(ref, state);
  }
});

function save() {
  setDoc(ref, state);
}

function activeEffects(turn) {
  return state.effects.filter(e =>
    turn >= e.start && turn < e.start + e.duration
  );
}

function damageAtTurn(turn) {
  return activeEffects(turn)
    .reduce((sum, e) => sum + e.dmg, 0);
}

function totalDamageUpTo(turn) {
  let dmg = 0;
  for (let t = 0; t < turn; t++) {
    dmg += damageAtTurn(t);
  }
  return dmg;
}

function hpAt(turn) {
  return state.maxHp - totalDamageUpTo(turn);
}

function render() {
  const hp = hpAt(state.turn);
  const nextHp = hpAt(state.turn + 1);

  const bar = document.getElementById("hpBar");
  bar.innerHTML = "";

  const ticks = 20;
  const hpPerTick = state.maxHp / ticks;

  for (let i = 0; i < ticks; i++) {
    const tickHp = i * hpPerTick;
    const div = document.createElement("div");
    div.className = "tick";

    if (tickHp < hp) div.classList.add("filled");
    else if (tickHp < nextHp) div.classList.add("incoming");

    bar.appendChild(div);
  }

  document.getElementById("hpText").innerText =
    `Turn ${state.turn} — HP: ${hp} → ${nextHp}`;

  const effectsDiv = document.getElementById("effects");
  effectsDiv.innerHTML = "";

  activeEffects(state.turn).forEach(e => {
    const left = (e.start + e.duration) - state.turn;
    effectsDiv.innerHTML +=
      `<div>${e.name} (${e.dmg}/turn, ${left} turns left)</div>`;
  });
}

window.nextTurn = function() {
  state.turn++;
  save();
};

window.prevTurn = function() {
  state.turn = Math.max(0, state.turn - 1);
  save();
};

window.addEffect = function() {
  const name = document.getElementById("ename").value;
  const dmg = parseInt(document.getElementById("edmg").value);
  const dur = parseInt(document.getElementById("edur").value);

  state.effects.push({
    name,
    dmg,
    duration: dur,
    start: state.turn
  });

  save();
};
</script>

</body>
</html>

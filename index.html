<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
}

.unit {
  padding: 10px;
  margin: 5px;
  background: #222;
  cursor: grab;
}

.unit.active {
  outline: 2px solid yellow;
}

button, input {
  margin: 3px;
}

/* Simple modal panel */
#panel {
  position: fixed;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  padding: 15px;
  border: 1px solid #555;
  display: none;
}
</style>
</head>

<body>

<h2>TTRPG Tracker</h2>

<button onclick="addUnit()">+ Add Unit</button>

<div id="units"></div>

<!-- UNIT EDIT PANEL -->
<div id="panel">
  <h3 id="panelTitle"></h3>

  Name: <input id="u_name"><br>
  HP: <input id="u_hp" type="number">
  / <input id="u_max" type="number"><br>

  <button onclick="saveUnit()">Save</button>
  <button onclick="closePanel()">Close</button>

  <h4>Status Effects</h4>
  <div id="effects"></div>

  <h4>Add Effect</h4>
  <input id="e_name" placeholder="Name">
  <input id="e_amt" type="number" placeholder="HP">
  <button onclick="flipSign()">±</button>
  <input id="e_dur" type="number" placeholder="Turns">

  <button onclick="addEffect()">Add</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "sidegoons.firebaseapp.com",
  authDomain: "sidegoons",
  projectId: "sidegoons"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "game", "state");

/* ---------------- STATE ---------------- */
let state = {
  units: []
};

let selectedUnit = null;

/* ---------------- SYNC ---------------- */
onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    state = snap.data();
    render();
  } else {
    setDoc(ref, state);
  }
});

function save() {
  setDoc(ref, state);
}

/* ---------------- UNITS ---------------- */

window.addUnit = function() {
  state.units.push({
    name: "Unit",
    hp: 10,
    maxHp: 10,
    turn: 0,
    effects: []
  });
  save();
};

function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {
    const div = document.createElement("div");
    div.className = "unit";
    div.draggable = true;

    div.innerHTML = `
      <b>${u.name}</b><br>
      HP: ${u.hp}/${u.maxHp}<br>
      Turn: ${u.turn}<br>
      <button onclick="prevTurn(${i})">⬅</button>
      <button onclick="nextTurn(${i})">➡</button>
    `;

    // Click = open editor
    div.onclick = () => openPanel(i);

    // Drag logic
    div.ondragstart = (e) => {
      e.dataTransfer.setData("index", i);
    };

    div.ondragover = (e) => e.preventDefault();

    div.ondrop = (e) => {
      const from = e.dataTransfer.getData("index");
      const to = i;

      const moved = state.units.splice(from, 1)[0];
      state.units.splice(to, 0, moved);

      save();
    };

    container.appendChild(div);
  });
}

/* ---------------- TURN CONTROL ---------------- */

window.nextTurn = function(i) {
  const u = state.units[i];
  u.turn++;

  applyEffects(u);
  save();
};

window.prevTurn = function(i) {
  const u = state.units[i];
  u.turn = Math.max(0, u.turn - 1);

  // NOTE: does NOT reverse HP (simple version)
  save();
};

/* ---------------- EFFECT SYSTEM ---------------- */

/*
Each effect:
{
  name,
  amount (positive or negative HP per turn),
  duration,
  startTurn
}
*/

function applyEffects(unit) {
  unit.effects.forEach(e => {
    if (unit.turn >= e.start && unit.turn < e.start + e.duration) {
      unit.hp += e.amount;
    }
  });
}

/* ---------------- PANEL ---------------- */

function openPanel(i) {
  selectedUnit = i;
  const u = state.units[i];

  document.getElementById("panel").style.display = "block";
  document.getElementById("panelTitle").innerText = u.name;

  document.getElementById("u_name").value = u.name;
  document.getElementById("u_hp").value = u.hp;
  document.getElementById("u_max").value = u.maxHp;

  renderEffects();
}

function closePanel() {
  document.getElementById("panel").style.display = "none";
}

/* Save unit edits */
window.saveUnit = function() {
  const u = state.units[selectedUnit];

  u.name = document.getElementById("u_name").value;
  u.hp = parseInt(document.getElementById("u_hp").value);
  u.maxHp = parseInt(document.getElementById("u_max").value);

  save();
  render();
};

/* ---------------- EFFECT UI ---------------- */

function renderEffects() {
  const u = state.units[selectedUnit];
  const div = document.getElementById("effects");
  div.innerHTML = "";

  u.effects.forEach(e => {
    const left = (e.start + e.duration) - u.turn;

    div.innerHTML += `
      <div>
        ${e.name} (${e.amount}/turn, ${left} turns)
      </div>
    `;
  });
}

/* Toggle positive/negative */
window.flipSign = function() {
  const input = document.getElementById("e_amt");
  input.value = -parseInt(input.value || 0);
};

/* Add new effect */
window.addEffect = function() {
  const u = state.units[selectedUnit];

  const name = document.getElementById("e_name").value;
  const amt = parseInt(document.getElementById("e_amt").value);
  const dur = parseInt(document.getElementById("e_dur").value);

  u.effects.push({
    name,
    amount: amt,
    duration: dur,
    start: u.turn,

    // 🔮 FUTURE: action-based system placeholder
    actions: 0
  });

  save();
  renderEffects();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sidegoons TTRPG Host v1.0.0</title>
    <style>
        :root { --bg: #121212; --surf: #1e1e1e; --border: #333; --text: #eee; --accent: #00adb5; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        #history-log { width: 50%; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #unit-mgmt { width: 50%; padding: 20px; overflow-y: auto; }
        
        .header { padding: 15px; border-bottom: 1px solid var(--border); background: #1a1a1a; }
        #log-output { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 5px; }
        .log-line { font-family: monospace; font-size: 13px; color: #aaa; border-bottom: 1px solid #222; padding-bottom: 2px; }

        /* Unit Cards */
        .unit-card { background: var(--surf); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 15px; }
        .unit-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .hp-input { width: 50px; background: #000; color: #fff; border: 1px solid var(--border); text-align: center; }
        
        /* Details Menu */
        .details { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
        .status-box { background: #252525; padding: 8px; margin: 5px 0; border-radius: 3px; display: flex; gap: 10px; align-items: center; }
        .preview { color: var(--accent); font-size: 13px; margin: 10px 0; padding: 5px; border: 1px dashed var(--accent); }
        
        input, select, button { background: #333; color: #fff; border: 1px solid var(--border); padding: 5px; border-radius: 3px; }
        button { cursor: pointer; background: #444; }
        button:hover { background: #555; }
        .btn-add { background: var(--accent); border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="history-log">
    <div class="header">Activity Log</div>
    <div id="log-output"></div>
</div>

<div id="unit-mgmt">
    <div class="header">Unit Management <small>v1.0.0</small></div>
    
    <div style="margin: 20px 0;">
        <input type="text" id="in-name" placeholder="Name">
        <input type="number" id="in-hp" placeholder="HP" style="width:60px">
        <button class="btn-add" onclick="addUnit()">Add Unit</button>
    </div>

    <div id="unit-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPwnxFEJCJqbVX0U-vWKjIG8cTfh3jebI",
        authDomain: "sidegoons.firebaseapp.com",
        projectId: "sidegoons",
        storageBucket: "sidegoons.firebasestorage.app",
        messagingSenderId: "275598873443",
        appId: "1:275598873443:web:8683ddc1a5c5c6c7a1f956"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "units");

    // Helper: Logging
    window.logMsg = (msg) => {
        const out = document.getElementById('log-output');
        const div = document.createElement('div');
        div.className = 'log-line';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        out.appendChild(div);
    };

    // Action: Add Unit
    window.addUnit = async () => {
        const name = document.getElementById('in-name').value;
        const hp = parseInt(document.getElementById('in-hp').value);
        if(!name || !hp) return;
        await addDoc(colRef, { name, curHP: hp, maxHP: hp, turn: 1, statuses: [] });
        logMsg(`Created Unit: ${name}`);
        document.getElementById('in-name').value = '';
        document.getElementById('in-hp').value = '';
    };

    // Action: Update Field
    window.modUnit = async (id, name, field, newVal) => {
        const d = doc(db, "units", id);
        await updateDoc(d, { [field]: newVal });
        logMsg(`Modified ${name}: ${field} to ${newVal}`);
    };

    // Action: Add Status
    window.applyStatus = async (id, unitName) => {
        const sName = document.getElementById(`sn-${id}`).value;
        const sCause = document.getElementById(`sc-${id}`).value;
        const sVal = document.getElementById(`sv-${id}`).value;
        const sDur = document.getElementById(`sd-${id}`).value;
        const sType = document.getElementById(`st-${id}`).value; // heal or hurt
        
        const sign = sType === "heal" ? "+" : "-";
        const previewText = `${sCause} inflicted ${sName} on ${unitName} (${sign}${sVal} hp, ${sDur} turns)`;
        
        const newStatus = { name: sName, cause: sCause, val: sVal, dur: sDur, type: sType };
        const d = doc(db, "units", id);
        await updateDoc(d, { statuses: arrayUnion(newStatus) });
        
        logMsg(previewText);
    };

    // Action: Preview Sync
    window.syncPreview = (id, unitName) => {
        const sName = document.getElementById(`sn-${id}`).value || "?";
        const sCause = document.getElementById(`sc-${id}`).value || "?";
        const sVal = document.getElementById(`sv-${id}`).value || "0";
        const sDur = document.getElementById(`sd-${id}`).value || "0";
        const sign = document.getElementById(`st-${id}`).value === "heal" ? "+" : "-";
        document.getElementById(`pv-${id}`).innerText = `Preview: ${sCause} inflicted ${sName} on ${unitName} (${sign}${sVal} hp, ${sDur} turns)`;
    };

    // Render Logic
    onSnapshot(colRef, (snap) => {
        const list = document.getElementById('unit-list');
        list.innerHTML = '';
        snap.forEach(s => {
            const u = s.data();
            const id = s.id;
            const div = document.createElement('div');
            div.className = 'unit-card';
            div.innerHTML = `
                <div class="unit-row">
                    <strong>${u.name}</strong>
                    <div>
                        HP: <input type="number" class="hp-input" value="${u.curHP}" onchange="modUnit('${id}', '${u.name}', 'curHP', parseInt(this.value))"> / ${u.maxHP}
                        | Turn: <button onclick="modUnit('${id}', '${u.name}', 'turn', ${u.turn - 1})">-</button> ${u.turn} <button onclick="modUnit('${id}', '${u.name}', 'turn', ${u.turn + 1})">+</button>
                    </div>
                </div>
                <div class="details">
                    <small>Active Statuses:</small>
                    <div id="stat-list-${id}">
                        ${u.statuses.map(st => `<div class="status-box">${st.name} (${st.type === 'heal' ? '+' : '-'}${st.val} HP) [${st.dur} turns]</div>`).join('')}
                    </div>
                    <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                        <input id="sn-${id}" placeholder="Status Name" oninput="syncPreview('${id}', '${u.name}')">
                        <input id="sc-${id}" placeholder="Cause" oninput="syncPreview('${id}', '${u.name}')">
                        <input id="sv-${id}" type="number" placeholder="HP/DMG" oninput="syncPreview('${id}', '${u.name}')">
                        <input id="sd-${id}" type="number" placeholder="Duration" oninput="syncPreview('${id}', '${u.name}')">
                        <select id="st-${id}" onchange="syncPreview('${id}', '${u.name}')">
                            <option value="hurt">Hurts (-)</option>
                            <option value="heal">Heals (+)</option>
                        </select>
                        <button onclick="applyStatus('${id}', '${u.name}')">Apply Status</button>
                    </div>
                    <div class="preview" id="pv-${id}">Preview: Waiting...</div>
                </div>
            `;
            list.appendChild(div);
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  margin: 0;
}

.container {
  display: flex;
}

/* LEFT SIDE */
#main {
  flex: 2;
  padding: 10px;
}

/* RIGHT SIDE LOG */
#log {
  flex: 1;
  background: #000;
  padding: 10px;
  border-left: 2px solid #444;
  max-height: 100vh;
  overflow-y: auto;
}

.unit {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

.panel {
  padding: 10px;
  margin-top: 5px;
  display: none;
}

.row {
  display: flex;
  align-items: center;
  gap: 5px;
}

.turnBox {
  width: 40px;
  text-align: center;
}

input {
  margin: 2px;
}
</style>
</head>

<body>

<div class="container">

  <!-- MAIN -->
  <div id="main">
    <h2>TTRPG Tracker</h2>
    <button onclick="addUnit()">+ Add Unit</button>
    <div id="units"></div>
  </div>

  <!-- HISTORY LOG -->
  <div id="log">
    <h3>History</h3>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "sidegoons.firebaseapp.com",
  authDomain: "sidegoons",
  projectId: "sidegoons"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "game", "state");

/* ---------------- STATE ---------------- */
let state = {
  units: [],
  log: []
};

/* ---------------- SYNC ---------------- */
onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    state = snap.data();
    render();
  } else {
    setDoc(ref, state);
  }
});

function save() {
  setDoc(ref, state);
}

/* ---------------- ADD UNIT ---------------- */
window.addUnit = function() {
  state.units.push({
    name: "Unit",
    hp: 10,
    maxHp: 10,
    turn: 0,
    history: [],
    effects: [],
    open: false,
    color: "#222",
    panelColor: "#1a1a1a"
  });

  state.log.push("Added new unit");
  save();
};

/* ---------------- RENDER ---------------- */
function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {

    const div = document.createElement("div");
    div.className = "unit";
    div.style.background = u.color;

    /* HEADER */
    div.innerHTML = `
      <div class="row">
        <span>${u.open ? "▼" : "▶"}</span>

        <b>${u.name}</b>
        HP: ${u.hp}/${u.maxHp}

        <button onclick="event.stopPropagation(); prevTurn(${i})">-</button>

        <input class="turnBox" value="${u.turn}"
          onclick="event.stopPropagation();"
          onchange="setTurn(${i}, this.value)">

        <button onclick="event.stopPropagation(); nextTurn(${i})">+</button>
      </div>
    `;

    /* PANEL */
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.style.background = u.panelColor;
    if (u.open) panel.style.display = "block";

    panel.innerHTML = `
      Name: <input value="${u.name}" onchange="setName(${i}, this.value)"><br>

      HP:
      <input type="number" value="${u.hp}" onchange="setHP(${i}, this.value)">
      /
      <input type="number" value="${u.maxHp}" onchange="setMaxHP(${i}, this.value)">

      <br><br>

      Outside Color:
      <input type="color" value="${u.color}" onchange="setColor(${i}, this.value)">

      Inside Color:
      <input type="color" value="${u.panelColor}" onchange="setPanelColor(${i}, this.value)">

      <h4>Effects</h4>
      <div id="effects-${i}"></div>

      <input id="ename-${i}" placeholder="Name">
      <input id="ecause-${i}" placeholder="Cause">
      <input id="eval-${i}" type="number" placeholder="HP">

      <!-- SIGN TOGGLE -->
      <button onclick="flipSign(${i})">±</button>

      <input id="edur-${i}" type="number" placeholder="Turns">

      <button onclick="addEffect(${i})">Add</button>
    `;

    /* Prevent panel clicks from closing */
    panel.onclick = (e) => e.stopPropagation();

    /* Toggle panel ONLY when clicking header */
    div.onclick = (e) => {
      if (e.target.closest(".panel")) return;
      u.open = !u.open;
      save();
    };

    div.appendChild(panel);
    container.appendChild(div);

    renderEffects(i);
  });

  renderLog();
}

/* ---------------- TURN SYSTEM (TRUE REWIND) ---------------- */

function snapshot(u) {
  u.history.push({
    hp: u.hp,
    turn: u.turn
  });
}

window.nextTurn = function(i) {
  const u = state.units[i];

  snapshot(u);
  u.turn++;

  applyEffects(u);

  state.log.push(`${u.name} advanced to turn ${u.turn}`);
  save();
};

window.prevTurn = function(i) {
  const u = state.units[i];

  if (u.history.length > 0) {
    const prev = u.history.pop();
    u.hp = prev.hp;
    u.turn = prev.turn;

    state.log.push(`${u.name} rewound to turn ${u.turn}`);
  }

  save();
};

window.setTurn = function(i, val) {
  const u = state.units[i];

  snapshot(u);
  u.turn = parseInt(val) || 0;

  state.log.push(`${u.name} set to turn ${u.turn}`);
  save();
};

/* ---------------- EFFECTS ---------------- */

function applyEffects(u) {
  u.effects.forEach(e => {
    if (u.turn >= e.start && u.turn < e.start + e.duration) {
      u.hp += e.amount;
    }
  });
}

window.addEffect = function(i) {
  const u = state.units[i];

  const name = document.getElementById(`ename-${i}`).value;
  const cause = document.getElementById(`ecause-${i}`).value || "Unknown";
  const val = parseInt(document.getElementById(`eval-${i}`).value);
  const dur = parseInt(document.getElementById(`edur-${i}`).value);

  u.effects.push({
    name,
    amount: val,
    duration: dur,
    start: u.turn,
    cause
  });

  state.log.push(
    `${cause} inflicted ${name} on ${u.name} for ${dur} turns (${val} HP)`
  );

  save();
};

window.flipSign = function(i) {
  const input = document.getElementById(`eval-${i}`);
  input.value = -parseInt(input.value || 0);
};

/* ---------------- RENDER EFFECTS ---------------- */

function renderEffects(i) {
  const u = state.units[i];
  const div = document.getElementById(`effects-${i}`);
  if (!div) return;

  div.innerHTML = "";

  u.effects.forEach(e => {
    const left = (e.start + e.duration) - u.turn;

    div.innerHTML += `
      <div>
        ${e.name} (${e.amount}/turn, ${left} turns) [${e.cause}]
      </div>
    `;
  });
}

/* ---------------- LOG ---------------- */

function renderLog() {
  const logDiv = document.getElementById("log");
  logDiv.innerHTML = "<h3>History</h3>";

  state.log.slice().reverse().forEach(entry => {
    logDiv.innerHTML += `<div>${entry}</div>`;
  });
}

/* ---------------- BASIC EDITS ---------------- */

window.setName = (i, val) => {
  state.units[i].name = val;
  save();
};

window.setHP = (i, val) => {
  state.units[i].hp = parseInt(val);
  save();
};

window.setMaxHP = (i, val) => {
  state.units[i].maxHp = parseInt(val);
  save();
};

window.setColor = (i, val) => {
  state.units[i].color = val;
  save();
};

window.setPanelColor = (i, val) => {
  state.units[i].panelColor = val;
  save();
};

</script>

</body>
</html>

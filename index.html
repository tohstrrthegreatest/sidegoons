<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
}

.unit {
  background: #222;
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

.panel {
  background: #1a1a1a;
  padding: 10px;
  margin-top: 5px;
  display: none;
}

.row {
  display: flex;
  align-items: center;
  gap: 5px;
}

input {
  width: 60px;
}

/* Turn box */
.turnBox {
  width: 40px;
  text-align: center;
}
</style>
</head>

<body>

<h2>TTRPG Tracker</h2>
<button onclick="addUnit()">+ Add Unit</button>

<div id="units"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "sidegoons.firebaseapp.com",
  authDomain: "sidegoons",
  projectId: "sidegoons"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "game", "state");

/* ---------------- STATE ---------------- */
let state = {
  units: []
};

/* ---------------- SYNC ---------------- */
onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    state = snap.data();
    render();
  } else {
    setDoc(ref, state);
  }
});

function save() {
  setDoc(ref, state);
}

/* ---------------- UNIT CREATION ---------------- */
window.addUnit = function() {
  state.units.push({
    name: "Unit",
    hp: 10,
    maxHp: 10,
    turn: 0,
    history: [], // 🔁 stores snapshots for rewind
    effects: [],
    open: false
  });
  save();
};

/* ---------------- RENDER ---------------- */
function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {

    const div = document.createElement("div");
    div.className = "unit";

    /* HEADER */
    div.innerHTML = `
      <div class="row">
        <b>${u.name}</b>
        HP: ${u.hp}/${u.maxHp}

        <!-- TURN CONTROL -->
        <button onclick="event.stopPropagation(); prevTurn(${i})">-</button>

        <input class="turnBox" value="${u.turn}"
          onclick="event.stopPropagation();"
          onchange="setTurn(${i}, this.value)">

        <button onclick="event.stopPropagation(); nextTurn(${i})">+</button>
      </div>
    `;

    /* PANEL */
    const panel = document.createElement("div");
    panel.className = "panel";
    if (u.open) panel.style.display = "block";

    panel.innerHTML = `
      Name: <input value="${u.name}" onchange="setName(${i}, this.value)"><br>
      HP: <input type="number" value="${u.hp}" onchange="setHP(${i}, this.value)">
      / <input type="number" value="${u.maxHp}" onchange="setMaxHP(${i}, this.value)">

      <h4>Effects</h4>
      <div id="effects-${i}"></div>

      <input id="ename-${i}" placeholder="Name">
      <input id="eval-${i}" type="number" placeholder="HP">

      <!-- SIGN TOGGLE -->
      <button onclick="flipSign(${i})">±</button>

      <input id="edur-${i}" type="number" placeholder="Turns">

      <button onclick="addEffect(${i})">Add</button>
    `;

    /* Toggle panel */
    div.onclick = () => {
      u.open = !u.open;
      save();
    };

    div.appendChild(panel);
    container.appendChild(div);

    renderEffects(i);
  });
}

/* ---------------- TURN SYSTEM (WITH TRUE REWIND) ---------------- */

/*
We store a snapshot BEFORE applying a turn change.
That allows exact rewind.
*/

function snapshot(u) {
  u.history.push({
    hp: u.hp,
    turn: u.turn
  });
}

window.nextTurn = function(i) {
  const u = state.units[i];

  snapshot(u); // save before change
  u.turn++;

  applyEffects(u);

  save();
};

window.prevTurn = function(i) {
  const u = state.units[i];

  if (u.history.length > 0) {
    const prev = u.history.pop();
    u.hp = prev.hp;
    u.turn = prev.turn;
  }

  save();
};

window.setTurn = function(i, val) {
  const u = state.units[i];

  snapshot(u);
  u.turn = parseInt(val) || 0;

  save();
};

/* ---------------- EFFECTS ---------------- */

function applyEffects(u) {
  u.effects.forEach(e => {
    if (u.turn >= e.start && u.turn < e.start + e.duration) {
      u.hp += e.amount;
    }
  });
}

window.addEffect = function(i) {
  const u = state.units[i];

  const name = document.getElementById(`ename-${i}`).value;
  const val = parseInt(document.getElementById(`eval-${i}`).value);
  const dur = parseInt(document.getElementById(`edur-${i}`).value);

  u.effects.push({
    name,
    amount: val,
    duration: dur,
    start: u.turn
  });

  save();
};

/* SIGN TOGGLE */
window.flipSign = function(i) {
  const input = document.getElementById(`eval-${i}`);
  input.value = -parseInt(input.value || 0);
};

/* ---------------- EFFECT RENDER ---------------- */

function renderEffects(i) {
  const u = state.units[i];
  const div = document.getElementById(`effects-${i}`);
  if (!div) return;

  div.innerHTML = "";

  u.effects.forEach(e => {
    const left = (e.start + e.duration) - u.turn;

    div.innerHTML += `
      <div>${e.name} (${e.amount}/turn, ${left} turns)</div>
    `;
  });
}

/* ---------------- BASIC EDITS ---------------- */

window.setName = (i, val) => {
  state.units[i].name = val;
  save();
};

window.setHP = (i, val) => {
  state.units[i].hp = parseInt(val);
  save();
};

window.setMaxHP = (i, val) => {
  state.units[i].maxHp = parseInt(val);
  save();
};

</script>

</body>
</html>

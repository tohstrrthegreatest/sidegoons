<!DOCTYPE html>
<html>
<head>
    <title>TTRPG Tracker</title>
    <style>
        body { font-family: sans-serif; background:#111; color:white; margin:0; }
        .container { display:flex; height:100vh; overflow:hidden; }
        #main { flex:1; padding:10px; overflow-y:auto; }
        #log { width:300px; background:#000; padding:10px; border-left:2px solid #444; overflow-y:auto; }
        #divider { width:5px; cursor:col-resize; background:#444; }
        #divider:hover { background:#666; }

        .unit { margin:5px; padding:10px; display:flex; justify-content:space-between; background:#222; border-radius: 4px; border: 1px solid transparent; }
        .unit-left { flex:1; }
        .rightCol { display:flex; flex-direction:column; align-items:center; gap: 4px; padding-left: 10px; }
        .panel { margin-top:10px; padding:10px; background:#1a1a1a; border-radius: 4px; cursor: default; }
        .effectRow { display:flex; justify-content:space-between; align-items: center; margin-bottom: 5px; background: #2a2a2a; padding: 5px; border-radius: 3px; }
        .delete { color:#ff4444; cursor:pointer; border: 1px solid #ff4444; background: none; padding: 2px 5px; border-radius: 3px; }
        .delete:hover { background: rgba(255,68,68,0.1); }
        .section { margin-top:10px; border-top: 1px solid #333; padding-top: 8px; }
        .grid { display:grid; grid-template-columns: 1.5fr 1fr auto 0.6fr 0.6fr; gap:5px; margin-bottom: 5px; }
        
        button { cursor: pointer; background: #444; color: white; border: 1px solid #555; padding: 4px 8px; border-radius: 3px; }
        button:hover { background: #555; }
        input { background: #333; color: white; border: 1px solid #555; padding: 3px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
  <div id="main">
    <h1>TTRPG Tracker</h1>
    <div style="margin-bottom:15px; display: flex; gap: 8px; flex-wrap: wrap;">
      <button onclick="addUnit()">+ Add Unit</button>
      <button onclick="clearUnits()">Clear All Units</button>
      <button onclick="clearAllEffects()">Clear All Status Effects</button>
      <button onclick="resetAllHP()">Reset HP</button>
    </div>
    <div id="units"></div>
  </div>

  <div id="divider"></div>

  <div id="log">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin:0">History</h3>
        <input type="color" id="outlineColor" value="#ffffff" onchange="updateOutlineColor(this.value)">
    </div>
    <button onclick="clearHistory()" style="width: 100%; margin-bottom: 10px;">Clear History</button>
    <div id="logContent"></div>
  </div>
</div>

<script>
let state = {
  units: [],
  log: [],
  outlineColor: '#ffffff'
};

/* ---------------- CORE ACTIONS ---------------- */
function addUnit() {
  state.units.push({
    id: Date.now() + Math.random(),
    name: "New Unit",
    hp: 10,
    maxHp: 10,
    turn: 0,
    effects: [],
    open: false,
    sign: -1 // Set to -1 by default for damage
  });
  log("Added new unit");
  render();
}

function log(text) {
  state.log.push(text);
  renderLog();
}

function updateOutlineColor(val) {
    state.outlineColor = val;
    render();
}

/* ---------------- RENDERING ---------------- */
function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {
    const div = document.createElement("div");
    div.className = "unit";
    div.style.borderColor = u.open ? state.outlineColor : 'transparent';
    
    // Header Click Logic
    div.onclick = (e) => {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
            u.open = !u.open; 
            render();
        }
    };

    div.innerHTML = `
      <div class="unit-left">
        <div><span>${u.open ? "▼" : "▶"}</span> <b>${u.name}</b> — HP: ${u.hp}/${u.maxHp}</div>
        
        <div class="panel" style="display: ${u.open ? 'block' : 'none'}">
          <div class="section">
              Name: <input style="width:120px" value="${u.name}" oninput="state.units[${i}].name = this.value">
              HP: <input style="width:40px" type="number" value="${u.hp}" oninput="state.units[${i}].hp = parseInt(this.value) || 0">
              / <input style="width:40px" type="number" value="${u.maxHp}" oninput="state.units[${i}].maxHp = parseInt(this.value) || 0">
          </div>
          <div class="section">
              <b>Effects</b>
              <div id="effects-list-${i}" style="margin: 5px 0;">
                ${u.effects.map((e, eIdx) => `
                    <div class="effectRow">
                        <span style="font-size: 0.9em;">${e.name} <i style="color:#aaa">(${e.cause})</i>: <b>${e.dmg > 0 ? '+':''}${e.dmg} HP</b> (${e.duration} turns)</span>
                        <button class="delete" onclick="deleteEffect(${i}, ${eIdx})">X</button>
                    </div>
                `).join('')}
              </div>
              <div class="grid">
                  <input id="ename-${i}" placeholder="Effect">
                  <input id="ecause-${i}" placeholder="Cause">
                  <button onclick="toggleSign(${i})">${u.sign === 1 ? "+" : "-"}</button>
                  <input id="eval-${i}" type="number" placeholder="HP">
                  <input id="edur-${i}" type="number" placeholder="Turns">
              </div>
              <button style="width:100%; margin-top:5px;" onclick="addEffect(${i})">Apply Effect</button>
          </div>
          <div class="section" style="display:flex; justify-content: space-between; margin-top: 10px;">
              <button onclick="duplicateUnit(${i})">Duplicate</button>
              <button class="delete" onclick="deleteUnit(${i})">Delete Unit</button>
          </div>
        </div>
      </div>

      <div class="rightCol">
          <button onclick="changeTurn(${i}, 1)">+</button>
          <div style="font-size: 0.8em; font-weight: bold;">Turn ${u.turn}</div>
          <button onclick="changeTurn(${i}, -1)">-</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function renderLog() {
  const c = document.getElementById("logContent");
  c.innerHTML = state.log.slice().reverse().map(entry => 
    `<div style="border-bottom: 1px solid #222; padding: 4px 0; font-size: 0.9em;">${entry}</div>`
  ).join('');
}

/* ---------------- LOGIC FUNCTIONS ---------------- */
function changeTurn(i, amt) {
    state.units[i].turn = Math.max(0, state.units[i].turn + amt);
    log(`${state.units[i].name} turn updated to ${state.units[i].turn}`);
    render();
}

function addEffect(i) {
    const name = document.getElementById(`ename-${i}`).value;
    const cause = document.getElementById(`ecause-${i}`).value || "Unknown";
    const dmg = parseInt(document.getElementById(`eval-${i}`).value) || 0;
    const dur = parseInt(document.getElementById(`edur-${i}`).value) || 0;
    
    if(!name) return;

    state.units[i].effects.push({ 
        name, 
        cause, 
        dmg: dmg * state.units[i].sign, 
        duration: dur 
    });
    
    log(`Effect "${name}" applied to ${state.units[i].name}`);
    render();
}

function deleteEffect(uIdx, eIdx) {
    state.units[uIdx].effects.splice(eIdx, 1);
    render();
}

function toggleSign(i) {
    state.units[i].sign *= -1;
    render();
}

function duplicateUnit(i) {
    const copy = JSON.parse(JSON.stringify(state.units[i]));
    copy.id = Date.now() + Math.random();
    state.units.splice(i + 1, 0, copy);
    log(`Duplicated ${state.units[i].name}`);
    render();
}

function deleteUnit(i) {
    log(`Removed ${state.units[i].name}`);
    state.units.splice(i, 1);
    render();
}

function clearUnits() { if(confirm("Delete all units?")) { state.units = []; log("Cleared all units"); render(); } }
function clearAllEffects() { state.units.forEach(u => u.effects = []); log("Cleared all effects"); render(); }
function resetAllHP() { state.units.forEach(u => u.hp = u.maxHp); log("Reset all HP"); render(); }
function clearHistory() { state.log = []; renderLog(); }

/* ---------------- RESIZE LOGIC ---------------- */
const divider = document.getElementById("divider");
const logBox = document.getElementById("log");
let isResizing = false;

divider.onmousedown = () => isResizing = true;
document.onmouseup = () => isResizing = false;
document.onmousemove = (e) => {
    if (!isResizing) return;
    const newWidth = window.innerWidth - e.clientX;
    if(newWidth > 100 && newWidth < 600) logBox.style.width = newWidth + "px";
};

// Initial Render
render();
</script>
</body>
</html>

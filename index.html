<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  margin: 0;
}

/* LAYOUT */
.container {
  display: flex;
  height: 100vh;
}

#main {
  flex: 2;
  padding: 10px;
  overflow-y: auto;
}

/* RESIZABLE LOG */
#log {
  width: 300px;
  background: #000;
  padding: 10px;
  border-left: 2px solid #444;
  overflow-y: auto;
  resize: horizontal;
}

/* UNIT */
.unit {
  margin: 5px;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

/* LEFT CONTENT */
.unit-left {
  flex: 1;
}

/* DRAG HANDLE */
.drag {
  cursor: grab;
  padding: 0 5px;
}

/* TURN CONTROL (VERTICAL RIGHT) */
.turnControl {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.turnBox {
  width: 40px;
  text-align: center;
}

/* PANEL */
.panel {
  margin-top: 5px;
  padding: 10px;
}

/* EFFECT ROW */
.effectRow {
  display: flex;
  justify-content: space-between;
}

/* DELETE BUTTON */
.delete {
  color: red;
  cursor: pointer;
}

/* SECTION SPACING */
.section {
  margin-top: 15px;
}

/* PREVIEW */
.preview {
  font-size: 0.9em;
  opacity: 0.8;
  margin-top: 5px;
}

/* WRAP LOG TEXT */
#log div {
  word-wrap: break-word;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">

  <!-- MAIN -->
  <div id="main">
    <h1>TTRPG Tracker</h1>
    <div>Version: 4</div>

    <button onclick="addUnit()">+ Add Unit</button>
    <div id="units"></div>
  </div>

  <!-- LOG -->
  <div id="log">
    <h3>History</h3>
  </div>

</div>

<script>
let state = {
  units: [],
  log: []
};

/* ---------------- ADD UNIT ---------------- */
function addUnit() {
  state.units.push({
    name: "Unit",
    hp: 10,
    maxHp: 10,
    turn: 0,
    history: [],
    effects: [],
    open: false,
    color: "#222",
    panelColor: "#1a1a1a",
    sign: 1
  });
  log("Added new unit");
  render();
}

/* ---------------- LOG ---------------- */
function log(text) {
  state.log.push(text);
}

/* ---------------- RENDER ---------------- */
function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {

    const div = document.createElement("div");
    div.className = "unit";
    div.style.background = u.color;

    /* LEFT */
    const left = document.createElement("div");
    left.className = "unit-left";

    left.innerHTML = `
      <div>
        <span>${u.open ? "▼" : "▶"}</span>
        <b>${u.name}</b>
        HP: ${u.hp}/${u.maxHp}
      </div>
    `;

    /* PANEL */
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.style.background = u.panelColor;
    if (!u.open) panel.style.display = "none";

    panel.innerHTML = `
      Name: <input value="${u.name}" onchange="setName(${i}, this.value)"><br>

      HP:
      <input type="number" value="${u.hp}" onchange="setHP(${i}, this.value)">
      /
      <input type="number" value="${u.maxHp}" onchange="setMaxHP(${i}, this.value)">

      <div style="text-align:right">
        Outside Color:<br>
        <input type="color" value="${u.color}" onchange="setColor(${i}, this.value)"><br>
        Inside Color:<br>
        <input type="color" value="${u.panelColor}" onchange="setPanelColor(${i}, this.value)">
      </div>

      <div class="section">
        <b>Active Status Effects</b>
        <div id="effects-${i}"></div>
      </div>

      <div class="section">
        <b>Create New Status Effect</b><br>

        <button onclick="toggleSign(${i})">${u.sign === 1 ? "+" : "-"}</button>

        <input id="eval-${i}" type="number" placeholder="HP">
        <input id="edur-${i}" type="number" placeholder="Turns"><br>

        <input id="ename-${i}" placeholder="Name">
        <input id="ecause-${i}" placeholder="Cause">

        <button onclick="addEffect(${i})">Add</button>

        <div class="preview" id="preview-${i}"></div>
      </div>

      <div class="section" style="display:flex; justify-content:space-between;">
        <button onclick="duplicateUnit(${i})">Duplicate</button>
        <button class="delete" onclick="deleteUnit(${i})">Delete</button>
      </div>
    `;

    panel.onclick = (e) => e.stopPropagation();

    left.appendChild(panel);

    /* TURN CONTROL */
    const turn = document.createElement("div");
    turn.className = "turnControl";

    turn.innerHTML = `
      <button onclick="event.stopPropagation(); prevTurn(${i})">-</button>

      <input class="turnBox" value="${u.turn}"
        onclick="event.stopPropagation();"
        onchange="setTurn(${i}, this.value)">

      <button onclick="event.stopPropagation(); nextTurn(${i})">+</button>
    `;

    /* DRAG HANDLE */
    const drag = document.createElement("div");
    drag.className = "drag";
    drag.innerText = "|||";

    drag.draggable = true;

    drag.ondragstart = (e) => {
      e.dataTransfer.setData("index", i);
    };

    div.ondragover = (e) => e.preventDefault();

    div.ondrop = (e) => {
      const from = e.dataTransfer.getData("index");
      const moved = state.units.splice(from, 1)[0];
      state.units.splice(i, 0, moved);
      render();
    };

    /* TOGGLE PANEL */
    div.onclick = (e) => {
      if (e.target.closest(".panel")) return;
      u.open = !u.open;
      render();
    };

    div.appendChild(left);
    div.appendChild(turn);
    div.appendChild(drag);

    container.appendChild(div);

    renderEffects(i);
    updatePreview(i);
  });

  renderLog();
}

/* ---------------- TURN SYSTEM ---------------- */
function snapshot(u) {
  u.history.push(JSON.parse(JSON.stringify({
    hp: u.hp,
    turn: u.turn,
    effects: u.effects
  })));
}

function nextTurn(i) {
  const u = state.units[i];
  snapshot(u);

  u.turn++;

  applyEffects(u);

  checkExpired(u);

  log(`${u.name} advanced to turn ${u.turn}`);
  render();
}

function prevTurn(i) {
  const u = state.units[i];

  if (u.history.length > 0) {
    const prev = u.history.pop();
    Object.assign(u, prev);
    log(`${u.name} rewound to turn ${u.turn}`);
  }

  render();
}

function setTurn(i, val) {
  const u = state.units[i];
  snapshot(u);

  u.turn = parseInt(val) || 0;
  log(`${u.name} set to turn ${u.turn}`);
  render();
}

/* ---------------- EFFECTS ---------------- */
function applyEffects(u) {
  u.effects.forEach(e => {
    if (u.turn >= e.start && u.turn < e.start + e.duration) {
      u.hp += e.amount;
    }
  });
}

function checkExpired(u) {
  u.effects.forEach(e => {
    if (u.turn === e.start + e.duration) {
      log(`${e.name} expired on ${u.name}`);
    }
  });
}

function addEffect(i) {
  const u = state.units[i];

  const name = document.getElementById(`ename-${i}`).value;
  const cause = document.getElementById(`ecause-${i}`).value || "Unknown";
  const valRaw = parseInt(document.getElementById(`eval-${i}`).value);
  const dur = parseInt(document.getElementById(`edur-${i}`).value);

  const val = valRaw * u.sign;

  u.effects.push({
    name,
    amount: val,
    duration: dur,
    start: u.turn,
    cause
  });

  log(`${cause} inflicted ${name} on ${u.name} (${val} HP over ${dur} turns)`);

  render();
}

function toggleSign(i) {
  const u = state.units[i];
  u.sign *= -1;
  render();
}

function deleteEffect(i, index) {
  const u = state.units[i];
  log(`${u.effects[index].name} cleansed from ${u.name}`);
  u.effects.splice(index, 1);
  render();
}

/* ---------------- EFFECT RENDER ---------------- */
function renderEffects(i) {
  const u = state.units[i];
  const div = document.getElementById(`effects-${i}`);
  if (!div) return;

  div.innerHTML = "";

  u.effects.forEach((e, idx) => {
    const left = (e.start + e.duration) - u.turn;

    div.innerHTML += `
      <div class="effectRow">
        <span>
          ${e.name} (${e.amount} HP over ${e.duration} turns, ${left} left) [${e.cause}]
        </span>
        <span class="delete" onclick="deleteEffect(${i}, ${idx})">X</span>
      </div>
    `;
  });
}

/* ---------------- PREVIEW ---------------- */
function updatePreview(i) {
  const u = state.units[i];

  const name = document.getElementById(`ename-${i}`)?.value || "Effect";
  const cause = document.getElementById(`ecause-${i}`)?.value || "Someone";
  const valRaw = parseInt(document.getElementById(`eval-${i}`)?.value) || 0;
  const dur = parseInt(document.getElementById(`edur-${i}`)?.value) || 0;

  const val = valRaw * u.sign;

  const preview = document.getElementById(`preview-${i}`);
  if (!preview) return;

  preview.innerText =
    `${cause} inflicted ${name} on ${u.name} (${val} HP over ${dur} turns)`;
}

/* ---------------- LOG ---------------- */
function renderLog() {
  const logDiv = document.getElementById("log");
  logDiv.innerHTML = "<h3>History</h3>";

  state.log.slice().reverse().forEach(entry => {
    logDiv.innerHTML += `<div>${entry}</div>`;
  });
}

/* ---------------- BASIC ---------------- */
function setName(i, val) { state.units[i].name = val; }
function setHP(i, val) { state.units[i].hp = parseInt(val); }
function setMaxHP(i, val) { state.units[i].maxHp = parseInt(val); }
function setColor(i, val) { state.units[i].color = val; }
function setPanelColor(i, val) { state.units[i].panelColor = val; }

function deleteUnit(i) {
  log(`Deleted ${state.units[i].name}`);
  state.units.splice(i, 1);
  render();
}

function duplicateUnit(i) {
  const copy = JSON.parse(JSON.stringify(state.units[i]));
  state.units.splice(i + 1, 0, copy);
  log(`Duplicated ${copy.name}`);
  render();
}
</script>

</body>
</html>

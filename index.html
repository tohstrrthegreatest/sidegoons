<!DOCTYPE html>
<html>
<head>
    <title>TTRPG Tracker</title>
    <style>
        body { font-family: sans-serif; background:#111; color:white; margin:0; }
        .container { display:flex; height:100vh; overflow:hidden; }
        #main { flex:1; padding:10px; overflow-y:auto; }
        #log { width:300px; background:#000; padding:10px; border-left:2px solid #444; overflow-y:auto; }
        #divider { width:5px; cursor:col-resize; background:#444; }
        #divider:hover { background:#666; }

        .unit { margin:5px; padding:10px; display:flex; justify-content:space-between; background:#222; border-radius: 4px; cursor: pointer; }
        .unit-left { flex:1; }
        .rightCol { display:flex; flex-direction:column; align-items:center; gap: 4px; }
        .turnBox { width:40px; text-align:center; background: #333; color: white; border: 1px solid #555; }
        .drag { cursor:grab; margin-left:4px; color: #888; }
        .panel { margin-top:10px; padding:10px; background:#1a1a1a; border-radius: 4px; display:none; cursor: default; }
        .effectRow { display:flex; justify-content:space-between; align-items: center; margin-bottom: 5px; background: #2a2a2a; padding: 5px; }
        .delete { color:#ff4444; cursor:pointer; border: 1px solid #ff4444; background: none; padding: 2px 5px; }
        .section { margin-top:10px; border-top: 1px solid #333; pt: 5px; }
        .preview { opacity:0.8; font-size:0.9em; color: #aaa; min-height: 1.2em; }
        .grid { display:grid; grid-template-columns: 1fr 1fr auto 1fr 1fr; gap:5px; margin-bottom: 5px; }
        input.half { width:60px; }
        input.quarter { width:40px; }
    </style>
</head>
<body>

<div class="container">
  <div id="main">
    <h1>TTRPG Tracker</h1>
    <div style="margin-bottom:15px; display: flex; gap: 5px; flex-wrap: wrap;">
      <button onclick="addUnit()">+ Add Unit</button>
      <button onclick="clearUnits()">Clear All Units</button>
      <button onclick="clearAllEffects()">Clear All Status Effects</button>
      <button onclick="resetAllHP()">Reset HP</button>
    </div>
    <div id="units"></div>
  </div>

  <div id="divider"></div>

  <div id="log">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>History</h3>
        <input type="color" id="outlineColor" value="#ffffff">
    </div>
    <button onclick="clearHistory()" style="width: 100%; margin-bottom: 10px;">Clear History</button>
    <div id="logContent"></div>
  </div>
</div>

<script>
let state = {
  units: [],
  log: [],
  outlineColor: '#ffffff'
};

/* ---------------- CORE ACTIONS ---------------- */
function addUnit() {
  state.units.push({
    name: "New Unit",
    hp: 10,
    maxHp: 10,
    turn: 0,
    effects: [],
    open: false,
    color: "#222",
    panelColor: "#1a1a1a",
    sign: 1,
    selectedEffect: null
  });
  log("Added new unit");
  render();
}

function log(text) {
  state.log.push(text);
  renderLog();
}

/* ---------------- RENDERING ---------------- */
function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {
    const div = document.createElement("div");
    div.className = "unit";
    div.style.background = u.color;
    div.onclick = () => { u.open = !u.open; render(); };

    // Left Side
    const left = document.createElement("div");
    left.className = "unit-left";
    left.innerHTML = `<div><span>${u.open ? "▼" : "▶"}</span> <b>${u.name}</b> — HP: ${u.hp}/${u.maxHp}</div>`;

    // The Expandable Panel
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.style.display = u.open ? "block" : "none";
    panel.style.background = u.panelColor;
    panel.onclick = (e) => e.stopPropagation(); // Prevents closing when clicking inside

    panel.innerHTML = `
      <div class="section">
          Name: <input class="half" value="${u.name}" oninput="updateUnitField(${i}, 'name', this.value)">
          HP: <input class="quarter" type="number" value="${u.hp}" oninput="updateUnitField(${i}, 'hp', this.value)">
          / <input class="quarter" type="number" value="${u.maxHp}" oninput="updateUnitField(${i}, 'maxHp', this.value)">
      </div>
      <div class="section">
          <b>Effects</b>
          <div id="effects-list-${i}"></div>
          <div class="grid">
              <input id="ename-${i}" placeholder="Effect Name">
              <input id="ecause-${i}" placeholder="Cause">
              <button onclick="toggleSign(${i})">${u.sign === 1 ? "+" : "-"}</button>
              <input id="eval-${i}" type="number" class="quarter" placeholder="HP">
              <input id="edur-${i}" type="number" class="quarter" placeholder="Turns">
          </div>
          <button onclick="addEffect(${i})">Apply Effect</button>
      </div>
      <div class="section" style="display:flex; justify-content: space-between; margin-top: 10px;">
          <button onclick="duplicateUnit(${i})">Duplicate</button>
          <button class="delete" onclick="deleteUnit(${i})">Delete Unit</button>
      </div>
    `;

    left.appendChild(panel);
    div.appendChild(left);

    // Right Side (Turn Controls)
    const right = document.createElement("div");
    right.className = "rightCol";
    right.onclick = (e) => e.stopPropagation();
    right.innerHTML = `
        <button onclick="changeTurn(${i}, 1)">+</button>
        <div style="font-size: 0.8em;">Turn ${u.turn}</div>
        <button onclick="changeTurn(${i}, -1)">-</button>
    `;
    
    div.appendChild(right);
    container.appendChild(div);
    
    if(u.open) renderUnitEffects(i);
  });
}

function renderUnitEffects(uIdx) {
    const list = document.getElementById(`effects-list-${uIdx}`);
    const u = state.units[uIdx];
    list.innerHTML = u.effects.map((e, eIdx) => `
        <div class="effectRow">
            <span>${e.name} (${e.dmg > 0 ? '+':''}${e.dmg} HP, ${e.duration} turns)</span>
            <button class="delete" onclick="deleteEffect(${uIdx}, ${eIdx})">X</button>
        </div>
    `).join('');
}

function renderLog() {
  const c = document.getElementById("logContent");
  c.innerHTML = state.log.slice().reverse().map(entry => 
    `<div style="border-bottom: 1px solid #222; padding: 4px 0; font-size: 0.9em;">${entry}</div>`
  ).join('');
}

/* ---------------- LOGIC FUNCTIONS ---------------- */
function updateUnitField(i, field, val) {
    state.units[i][field] = field === 'name' ? val : parseInt(val);
}

function changeTurn(i, amt) {
    state.units[i].turn = Math.max(0, state.units[i].turn + amt);
    log(`${state.units[i].name} turn changed to ${state.units[i].turn}`);
    render();
}

function addEffect(i) {
    const name = document.getElementById(`ename-${i}`).value;
    const dmg = parseInt(document.getElementById(`eval-${i}`).value) || 0;
    const dur = parseInt(document.getElementById(`edur-${i}`).value) || 0;
    if(!name) return;

    state.units[i].effects.push({ name, dmg: dmg * state.units[i].sign, duration: dur });
    log(`Effect "${name}" added to ${state.units[i].name}`);
    render();
}

function deleteEffect(uIdx, eIdx) {
    state.units[uIdx].effects.splice(eIdx, 1);
    render();
}

function toggleSign(i) {
    state.units[i].sign *= -1;
    render();
}

function duplicateUnit(i) {
    const copy = JSON.parse(JSON.stringify(state.units[i]));
    state.units.splice(i + 1, 0, copy);
    render();
}

function deleteUnit(i) {
    state.units.splice(i, 1);
    render();
}

function clearUnits() { state.units = []; render(); }
function clearAllEffects() { state.units.forEach(u => u.effects = []); render(); }
function resetAllHP() { state.units.forEach(u => u.hp = u.maxHp); render(); }
function clearHistory() { state.log = []; renderLog(); }

/* ---------------- RESIZE LOGIC ---------------- */
const divider = document.getElementById("divider");
const logBox = document.getElementById("log");
let isResizing = false;

divider.onmousedown = () => isResizing = true;
document.onmouseup = () => isResizing = false;
document.onmousemove = (e) => {
    if (!isResizing) return;
    const newWidth = window.innerWidth - e.clientX;
    logBox.style.width = Math.max(100, newWidth) + "px";
};

// Initial Render
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidegoons TTRPG Host</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --accent: #7c4dff;
            --text: #e0e0e0;
            --border: #333;
            --danger: #cf6679;
            --success: #03dac6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        #history-column {
            width: 50%;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #unit-column {
            width: 50%;
            overflow-y: auto;
            padding: 20px;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            background: #111;
        }

        /* Log Styling */
        #log-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column-gap;
        }

        .log-entry {
            padding: 8px;
            border-left: 3px solid var(--accent);
            background: var(--surface);
            margin-bottom: 8px;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }

        /* Unit Cards */
        .unit-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .hp-controls button {
            background: #333;
            color: white;
            border: none;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Details Menu */
        .details-menu {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .status-item {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #252525;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }

        .preview-box {
            background: #111;
            padding: 10px;
            border: 1px dashed var(--accent);
            margin: 10px 0;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* Forms */
        input, select {
            background: #222;
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="history-column">
    <div class="header">
        <h2>Activity Log</h2>
    </div>
    <div id="log-container">
        <div class="log-entry">Session started. Version 1.0.0</div>
    </div>
</div>

<div id="unit-column">
    <div class="header">
        <h2>Unit Management <small style="opacity: 0.5">v1.0.0</small></h2>
    </div>

    <div style="margin: 20px 0;">
        <input type="text" id="unit-name-in" placeholder="Unit Name">
        <input type="number" id="unit-hp-in" placeholder="Max HP" style="width: 80px;">
        <button class="btn-primary" onclick="addUnit()">Add Unit</button>
    </div>

    <div id="unit-list">
        </div>
</div>

<script type="module">
    // --- FIREBASE CONFIG ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPwnxFEJCJqbVX0U-vWKjIG8cTfh3jebI",
        authDomain: "sidegoons.firebaseapp.com",
        projectId: "sidegoons",
        storageBucket: "sidegoons.firebasestorage.app",
        messagingSenderId: "275598873443",
        appId: "1:275598873443:web:8683ddc1a5c5c6c7a1f956"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const unitsRef = collection(db, "units");

    // --- LOGIC ---

    window.addUnit = async () => {
        const name = document.getElementById('unit-name-in').value;
        const hp = parseInt(document.getElementById('unit-hp-in').value);
        if(!name || !hp) return;

        await addDoc(unitsRef, {
            name: name,
            maxHP: hp,
            currentHP: hp,
            turn: 1,
            statuses: []
        });
        
        logAction(`${name} entered the fray.`);
        document.getElementById('unit-name-in').value = '';
    };

    function logAction(msg) {
        const container = document.getElementById('log-container');
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerText = msg;
        container.prepend(div);
    }

    // Update Turn or HP logic
    window.updateStat = async (id, field, delta, currentVal) => {
        const unitDoc = doc(db, "units", id);
        let newVal = currentVal + delta;
        if(field === 'currentHP') newVal = Math.min(Math.max(0, newVal)); 
        
        await updateDoc(unitDoc, { [field]: newVal });
        logAction(`Unit stat updated: ${field} is now ${newVal}`);
    };

    // This listener builds the UI whenever Firebase data changes
    onSnapshot(unitsRef, (snapshot) => {
        const list = document.getElementById('unit-list');
        list.innerHTML = '';

        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;

            const card = document.createElement('div');
            card.className = 'unit-card';
            card.innerHTML = `
                <div class="unit-header">
                    <div>
                        <strong>${data.name}</strong> 
                        <span>${data.currentHP} / ${data.maxHP} HP</span>
                        <div style="font-size: 0.8rem; color: #888;">Turn: ${data.turn}</div>
                    </div>
                    <div class="hp-controls">
                        <button onclick="updateStat('${id}', 'currentHP', -1, ${data.currentHP})">- HP</button>
                        <button onclick="updateStat('${id}', 'currentHP', 1, ${data.currentHP})">+ HP</button>
                        <button onclick="updateStat('${id}', 'turn', 1, ${data.turn})">Next Turn</button>
                    </div>
                </div>
                
                <div class="details-menu">
                    <h4>Status Effects</h4>
                    <div id="status-list-${id}">
                        ${renderStatuses(data.statuses, data.name)}
                    </div>
                    
                    <div class="status-creator" style="margin-top:15px; display:flex; flex-wrap:wrap; gap:5px;">
                        <input type="text" id="st-name-${id}" placeholder="Status Name" oninput="updatePreview('${id}', '${data.name}')">
                        <input type="text" id="st-cause-${id}" placeholder="Cause" oninput="updatePreview('${id}', '${data.name}')">
                        <input type="number" id="st-val-${id}" placeholder="Val" style="width:50px" oninput="updatePreview('${id}', '${data.name}')">
                        <select id="st-type-${id}" onchange="updatePreview('${id}', '${data.name}')">
                            <option value="hurt">Hurts (-)</option>
                            <option value="heal">Heals (+)</option>
                        </select>
                        <input type="number" id="st-dur-${id}" placeholder="Turns" style="width:50px" oninput="updatePreview('${id}', '${data.name}')">
                        <button class="btn-primary" onclick="addStatus('${id}', '${data.name}')">Apply</button>
                    </div>
                    <div class="preview-box" id="preview-${id}">Preview: Waiting for input...</div>
                </div>
            `;
            list.appendChild(card);
        });
    });

    function renderStatuses(statuses, unitName) {
        if(!statuses || statuses.length === 0) return '<p style="font-size:0.8rem; color:#666">No active effects.</p>';
        return statuses.map(s => `
            <div class="status-item">
                <b>${s.name}</b> (${s.type === 'heal' ? '+' : '-'}${s.value} HP) - ${s.duration} turns left
            </div>
        `).join('');
    }

    window.updatePreview = (id, unitName) => {
        const name = document.getElementById(`st-name-${id}`).value || "...";
        const cause = document.getElementById(`st-cause-${id}`).value || "...";
        const val = document.getElementById(`st-val-${id}`).value || "0";
        const type = document.getElementById(`st-type-${id}`).value;
        const dur = document.getElementById(`st-dur-${id}`).value || "0";
        const sign = type === 'heal' ? '+' : '-';

        const previewText = `${cause} inflicted ${name} on ${unitName} (${sign}${val} hp, ${dur} turns)`;
        document.getElementById(`preview-${id}`).innerText = `Preview: ${previewText}`;
    };

    window.addStatus = async (id, unitName) => {
        const name = document.getElementById(`st-name-${id}`).value;
        const cause = document.getElementById(`st-cause-${id}`).value;
        const val = document.getElementById(`st-val-${id}`).value;
        const dur = document.getElementById(`st-dur-${id}`).value;
        const type = document.getElementById(`st-type-${id}`).value;

        if(!name || !dur) return;

        // In a real production app, you'd fetch the current doc and push to the array
        // For this demo, we'll log the preview string as requested
        const previewText = `${cause} inflicted ${name} on ${unitName} (${type === 'heal' ? '+' : '-'}${val} hp, ${dur} turns)`;
        logAction(previewText);
        
        // Clear inputs
        document.getElementById(`st-name-${id}`).value = '';
    };

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>TTRPG Tracker v6.2.0.e</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a1a;
  --panel-bg: #222;
  --accent: #df7679;
  --text: #fff;
  --secondary: #333;
}

body {
  font-family: 'Fredoka', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

#main {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

#log {
  width: 300px; 
  background: #000;
  padding: 15px;
  border-left: 3px solid var(--accent);
  overflow-y: auto;
  resize: horizontal;
}

/* SLIM UNIT HEADER */
.unit {
  margin-bottom: 6px;
  padding: 6px 10px;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  border-left: 4px solid var(--accent);
}

.unit-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.unit-info {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.unit-info input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: white;
  font-family: 'Fredoka', sans-serif;
  font-size: 0.95em;
}

.hp-input { width: 38px; text-align: center; color: var(--accent) !important; font-weight: bold; }
.name-input { font-weight: 500; width: 130px; }

.panel {
  margin-top: 8px;
  padding: 10px;
  border-radius: 6px;
  background: var(--panel-bg);
  border: 1px solid #333;
}

.turn-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}

.turnBox {
  width: 30px;
  text-align: center;
  background: #111;
  border: 1px solid #444;
  color: white;
  border-radius: 4px;
  font-size: 0.85em;
}

.btn-small {
  padding: 2px 6px;
  font-size: 0.7em;
}

/* EFFECTS LIST */
.effectRow {
  display: flex;
  justify-content: space-between;
  padding: 6px;
  background: rgba(255,255,255,0.03);
  margin-bottom: 4px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85em;
}

.expired {
  text-decoration: line-through;
  opacity: 0.4;
  background: transparent;
  border: 1px dashed #444;
}

.switch-btn {
  width: 35px;
  height: 35px;
  font-weight: bold;
  background: var(--secondary);
}

.section-title {
  display: block;
  font-weight: 500;
  margin-bottom: 6px;
  font-size: 0.75em;
  color: var(--accent);
  text-transform: uppercase;
}

.row-1 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.row-2 { display: flex; gap: 8px; align-items: center; }
.row-2 input { flex: 1; }

input, button {
  background: #111;
  color: white;
  border: 1px solid #333;
  padding: 6px;
  border-radius: 4px;
  font-family: 'Fredoka', sans-serif;
}

button:hover { border-color: var(--accent); }

.delete { color: #ff5e5e; cursor: pointer; margin-left: 8px; }
.duplicate { color: #5ea3ff; cursor: pointer; margin-left: 8px; }

.preview-area {
  margin-top: 4px;
  color: #777;
  font-size: 0.8em;
  font-style: italic;
}
</style>
</head>

<body>

  <div id="main">
    <h1 id="title-header" style="margin: 0 0 10px 0; color: var(--accent); cursor:pointer; font-size: 1.5em;" onclick="toggleTheme()">TTRPG Tracker</h1>
    <div style="margin-bottom:10px; display:flex; align-items:center; gap:10px;">
      <span style="font-size: 0.7em; opacity: 0.5;">v6.2.0.e</span>
      <button onclick="addUnit()" style="background: var(--accent); color: #000; font-weight: 600; border:none; padding: 4px 10px;">+ Add Unit</button>
    </div>
    <div id="units"></div>
  </div>

  <div id="log">
    <h3 style="margin-top: 0; color: var(--accent); font-size: 1.1em;">History</h3>
    <div id="log-list"></div>
  </div>

<script>
let state = {
  units: [],
  log: [],
  theme: 'coral'
};

function toggleTheme() {
    state.theme = state.theme === 'coral' ? 'blue' : 'coral';
    const color = state.theme === 'blue' ? '#0fb1f5' : '#df7679';
    document.documentElement.style.setProperty('--accent', color);
    render();
}

function log(text) {
  state.log.push(text);
  renderLog();
}

function addUnit() {
  state.units.push({
    name: "New Unit", hp: 20, maxHp: 20, turn: 0, history: [], effects: [],
    open: false, color: "#252525", panelColor: "#1a1a1a", sign: -1
  });
  render();
}

function render() {
  const container = document.getElementById("units");
  container.innerHTML = "";

  state.units.forEach((u, i) => {
    const div = document.createElement("div");
    div.className = "unit";
    div.style.backgroundColor = u.color;

    div.innerHTML = `
      <div class="unit-header">
        <div class="unit-info">
          <span onclick="toggleOpen(${i})" style="cursor:pointer; width: 20px;">${u.open ? "▼" : "▶"}</span>
          <input class="name-input" value="${u.name}" onchange="setName(${i}, this.value)">
          <input class="hp-input" type="number" value="${u.hp}" onchange="setHP(${i}, this.value)">
          <span style="opacity:0.3">/</span>
          <input class="hp-input" type="number" value="${u.maxHp}" onchange="setMaxHP(${i}, this.value)">
        </div>
        <div class="turn-controls">
            <button class="btn-small" onclick="nextTurn(${i})">▲</button>
            <input class="turnBox" type="number" value="${u.turn}" onchange="setTurn(${i}, this.value)">
            <button class="btn-small" onclick="prevTurn(${i})">▼</button>
            <div style="cursor:grab; color:#555; margin-left:5px;" draggable="true" ondragstart="drag(${i}, event)">||</div>
        </div>
      </div>
    `;

    if (u.open) {
      const panel = document.createElement("div");
      panel.className = "panel";
      panel.style.backgroundColor = u.panelColor;
      panel.innerHTML = `
        <span class="section-title">Active Status Effects</span>
        <div id="effects-list-${i}"></div>

        <div style="margin-top:15px; border-top: 1px solid #333; padding-top:10px;">
          <span class="section-title">Add Status Effect</span>
          <div class="row-1">
            <input id="ename-${i}" placeholder="Name" oninput="updatePreview(${i})" onkeydown="handleEnter(event, 'ecause-${i}')">
            <input id="ecause-${i}" placeholder="Cause" oninput="updatePreview(${i})" onkeydown="handleEnter(event, 'eval-${i}')">
          </div>
          <div class="row-2">
            <button id="esign-${i}" class="switch-btn" onclick="toggleSign(${i})">${u.sign === 1 ? "+" : "-"}</button>
            <input id="eval-${i}" type="number" placeholder="Value" oninput="updatePreview(${i})" onkeydown="handleEnter(event, 'edur-${i}')">
            <input id="edur-${i}" type="number" placeholder="Turns" oninput="updatePreview(${i})" onkeydown="handleEnter(event, 'apply-${i}')">
          </div>
          <button id="apply-${i}" onclick="applyEffect(${i})" style="width:100%; margin-top:8px; background: var(--accent); color:#000; font-weight:600; border:none;">Apply</button>
          <div class="preview-area" id="preview-${i}">... (+0 HP / 0 turns)</div>
        </div>

        <div style="display:flex; justify-content:space-between; margin-top:15px;">
           <div style="display:flex; gap:5px;"><input type="color" value="${u.color}" onchange="setColor(${i}, this.value)"><input type="color" value="${u.panelColor}" onchange="setPanelColor(${i}, this.value)"></div>
           <div><button onclick="duplicateUnit(${i})">Clone</button><button onclick="deleteUnit(${i})" style="color:#ff5e5e">Delete</button></div>
        </div>
      `;
      div.appendChild(panel);
    }
    container.appendChild(div);
    if(u.open) renderEffects(i); 
  });
  renderLog();
}

function renderEffects(i) {
  const u = state.units[i];
  const listDiv = document.getElementById(`effects-list-${i}`);
  if (!listDiv) return;
  listDiv.innerHTML = ""; 

  u.effects.forEach((e, idx) => {
    const remaining = (e.start + e.duration) - u.turn;
    const isExpired = remaining <= 0;
    const typeLabel = e.amount >= 0 ? 'HP' : 'DMG';
    
    const row = document.createElement("div");
    row.className = `effectRow ${isExpired ? 'expired' : ''}`;
    row.onclick = () => loadEffectToForm(i, idx);
    row.innerHTML = `
      <span>${e.name} (${Math.abs(e.amount)} ${typeLabel} for ${remaining} TURNS)</span>
      <span>
        <span class="duplicate" onclick="event.stopPropagation(); duplicateEffect(${i}, ${idx})">⧉</span>
        <span class="delete" onclick="event.stopPropagation(); deleteEffect(${i}, ${idx})">×</span>
      </span>
    `;
    listDiv.appendChild(row);
  });
}

function applyEffect(i) {
  const u = state.units[i];
  const n = document.getElementById(`ename-${i}`).value || "Effect";
  const c = document.getElementById(`ecause-${i}`).value || "Someone";
  const v = (parseInt(document.getElementById(`eval-${i}`).value) || 0) * u.sign;
  const d = parseInt(document.getElementById(`edur-${i}`).value) || 0;

  u.effects.push({ name: n, cause: c, amount: v, duration: d, start: u.turn });
  log(`${c} inflicted ${n} on ${u.name}. (${Math.abs(v)} ${v>=0?'HP':'DMG'} for ${d} TURNS)`);
  render();
}

function handleEnter(e, nextId) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const nextEl = document.getElementById(nextId);
        if (nextEl) { nextEl.tagName === 'BUTTON' ? nextEl.click() : nextEl.focus(); }
    }
}

function nextTurn(i) {
  const u = state.units[i];
  u.history.push(JSON.stringify({hp: u.hp, turn: u.turn, effects: [...u.effects.map(e => ({...e}))]}));
  u.turn++;
  u.effects.forEach(e => {
    if (u.turn > e.start && u.turn <= (e.start + e.duration)) u.hp = Math.max(0, u.hp + e.amount);
  });
  log(`${u.name} → Turn ${u.turn}`);
  render();
}

function prevTurn(i) {
  const u = state.units[i];
  if (u.history.length > 0) { Object.assign(u, JSON.parse(u.history.pop())); render(); }
}

function toggleOpen(i) { state.units[i].open = !state.units[i].open; render(); }
function toggleSign(i) { state.units[i].sign *= -1; render(); }
function updatePreview(i) {
  const u = state.units[i];
  const n = document.getElementById(`ename-${i}`)?.value || "...";
  const v = (parseInt(document.getElementById(`eval-${i}`)?.value) || 0) * u.sign;
  const d = document.getElementById(`edur-${i}`)?.value || 0;
  const target = document.getElementById(`preview-${i}`);
  if (target) target.innerText = `${n} (${v>=0?"+":""}${v} ${v>=0?'HP':'DMG'} / ${d} turns)`;
}

function setName(i, v) { state.units[i].name = v; }
function setHP(i, v) { state.units[i].hp = parseInt(v) || 0; render(); }
function setMaxHP(i, v) { state.units[i].maxHp = parseInt(v) || 0; render(); }
function setTurn(i, v) { state.units[i].turn = parseInt(v) || 0; render(); }
function setColor(i, v) { state.units[i].color = v; render(); }
function setPanelColor(i, v) { state.units[i].panelColor = v; render(); }
function deleteEffect(i, ei) { state.units[i].effects.splice(ei, 1); render(); }
function duplicateEffect(i, ei) { state.units[i].effects.push({...state.units[i].effects[ei], start: state.units[i].turn}); render(); }
function deleteUnit(i) { state.units.splice(i, 1); render(); }
function duplicateUnit(i) { state.units.push(JSON.parse(JSON.stringify(state.units[i]))); render(); }
function drag(i, e) { e.dataTransfer.setData("idx", i); }
function drop(i, e) {
  const from = e.dataTransfer.getData("idx");
  const moved = state.units.splice(from, 1)[0];
  state.units.splice(i, 0, moved);
  render();
}
function renderLog() {
  const logBox = document.getElementById("log-list");
  logBox.innerHTML = state.log.slice().reverse().map(l => `<div style="border-bottom:1px solid #222; padding:5px; font-size:0.8em;">${l}</div>`).join("");
}
function loadEffectToForm(i, idx) {
  const u = state.units[i]; const e = u.effects[idx];
  document.getElementById(`ename-${i}`).value = e.name;
  document.getElementById(`ecause-${i}`).value = e.cause;
  document.getElementById(`eval-${i}`).value = Math.abs(e.amount);
  document.getElementById(`edur-${i}`).value = e.duration;
  u.sign = e.amount >= 0 ? 1 : -1;
  render();
}
addUnit();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidegoons TTRPG Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPwnxFEJCJqbVX0U-vWKjIG8cTfh3jebI",
            authDomain: "sidegoons.firebaseapp.com",
            projectId: "sidegoons",
            storageBucket: "sidegoons.firebasestorage.app",
            messagingSenderId: "275598873443",
            appId: "1:275598873443:web:8683ddc1a5c5c6c7a1f956"
        };
        const app = initializeApp(firebaseConfig);
    </script>
    <style>
        .resizer { width: 10px; cursor: col-resize; background: #e5e7eb; }
        .resizer:hover { background: #3b82f6; }
        .history-sidebar { min-width: 200px; max-width: 600px; }
        .ghost { opacity: 0.4; background: #dbeafe; }
        /* Spacing for misclick prevention */
        .btn-spacing { margin: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden text-sm md:text-base">

    <main class="flex-1 flex flex-col p-4 overflow-y-auto">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Sidegoons TTRPG</h1>
            <p class="text-gray-500 font-mono text-xs">Version 1.0.0</p>
        </header>

        <div class="flex flex-wrap gap-4 mb-6 p-4 bg-white rounded-lg shadow-sm border border-gray-200">
            <button onclick="addUnit()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Add Unit</button>
            <button onclick="resetAllHP()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">Reset to Max HP</button>
            <div class="flex-1"></div> <button onclick="clearStatusEffects()" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600 transition">Clear Status Effects</button>
            <button onclick="clearUnits()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition">Clear All Units</button>
        </div>

        <div class="flex items-center gap-4 mb-6 bg-gray-800 text-white p-4 rounded-lg">
            <span class="font-bold uppercase tracking-wider">Round Tracking:</span>
            <button onclick="changeGlobalTurn(-1)" class="bg-gray-700 px-3 py-1 rounded">-</button>
            <input type="number" id="globalTurn" value="1" class="w-16 bg-gray-900 text-center border-none rounded">
            <button onclick="changeGlobalTurn(1)" class="bg-gray-700 px-3 py-1 rounded">+</button>
        </div>

        <div id="unitContainer" class="space-y-4">
            </div>
    </main>

    <div class="resizer" id="dragMe"></div>

    <aside id="sidebar" class="history-sidebar bg-white border-l border-gray-300 flex flex-col w-80">
        <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="font-bold text-gray-700 uppercase">History Log</h2>
            <div class="flex gap-2">
                <button onclick="deleteSelectedHistory()" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-red-100 hover:text-red-600">Delete Selected</button>
                <button onclick="clearHistory()" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-red-100 hover:text-red-600">Clear All</button>
            </div>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto p-4 space-y-2">
            </div>
    </aside>

    <script>
        let units = [];
        let history = [];

        // --- CORE FUNCTIONS ---
        function addUnit() {
            const id = Date.now();
            const newUnit = {
                id,
                name: "New Unit",
                curHP: 10,
                maxHP: 10,
                statusEffects: [],
                isOpen: false
            };
            units.push(newUnit);
            logAction(`Created Unit: ${newUnit.name}`);
            render();
        }

        function clearUnits() {
            if(confirm("Delete all units?")) {
                units = [];
                logAction("Cleared all units");
                render();
            }
        }

        function resetAllHP() {
            units.forEach(u => u.curHP = u.maxHP);
            logAction("Reset all units to Max HP");
            render();
        }

        function clearStatusEffects() {
            units.forEach(u => u.statusEffects = []);
            logAction("Cleared all status effects from all units");
            render();
        }

        function logAction(msg) {
            const entry = { id: Date.now(), text: `[${new Date().toLocaleTimeString()}] ${msg}`, selected: false };
            history.unshift(entry);
            updateHistory();
        }

        // --- RENDERING ---
        function render() {
            const container = document.getElementById('unitContainer');
            container.innerHTML = '';

            units.forEach((unit, idx) => {
                const unitEl = document.createElement('div');
                unitEl.className = `bg-white border rounded-lg shadow-sm overflow-hidden border-l-4 ${unit.curHP <= 0 ? 'border-l-red-500' : 'border-l-blue-500'}`;
                unitEl.dataset.id = unit.id;

                unitEl.innerHTML = `
                    <div class="p-4 cursor-pointer flex justify-between items-center hover:bg-gray-50" onclick="toggleUnit(${unit.id})">
                        <div class="flex items-center gap-4">
                            <span class="text-gray-400 cursor-move drag-handle">☰</span>
                            <span class="font-bold text-lg">${unit.name}</span>
                        </div>
                        <div class="font-mono bg-gray-100 px-3 py-1 rounded">
                            HP: <span class="${unit.curHP < (unit.maxHP/2) ? 'text-red-600' : 'text-green-600'}">${unit.curHP}</span> / ${unit.maxHP}
                        </div>
                    </div>
                    
                    <div class="${unit.isOpen ? 'block' : 'hidden'} p-4 border-t bg-gray-50 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Unit Name</label>
                                <input type="text" value="${unit.name}" onchange="updateUnit(${unit.id}, 'name', this.value)" class="w-full border rounded p-2">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Current HP</label>
                                <input type="number" value="${unit.curHP}" onchange="updateUnit(${unit.id}, 'curHP', this.value)" class="w-full border rounded p-2">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Max HP</label>
                                <input type="number" value="${unit.maxHP}" onchange="updateUnit(${unit.id}, 'maxHP', this.value)" class="w-full border rounded p-2">
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="font-bold text-gray-700">Status Effects</h4>
                                <button onclick="showStatusForm(${unit.id})" class="text-xs bg-blue-500 text-white px-2 py-1 rounded">+ Add Effect</button>
                            </div>
                            <div id="status-list-${unit.id}" class="space-y-2">
                                ${unit.statusEffects.map((s, sIdx) => `
                                    <div class="bg-white border p-2 rounded flex justify-between items-center shadow-sm">
                                        <div>
                                            <span class="font-bold">${s.name}</span> 
                                            <span class="text-xs text-gray-500">(${s.val >= 0 ? '+' : ''}${s.val} HP, ${s.dur} turns)</span>
                                        </div>
                                        <div class="flex gap-2">
                                            <button onclick="duplicateStatus(${unit.id}, ${sIdx})" class="text-xs text-blue-500">Duplicate</button>
                                            <button onclick="editStatus(${unit.id}, ${sIdx})" class="text-xs text-gray-500">Edit</button>
                                            <button onclick="deleteStatus(${unit.id}, ${sIdx})" class="text-xs text-red-500">Delete</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <button onclick="deleteUnit(${unit.id})" class="text-xs text-red-500 underline">Delete Unit</button>
                    </div>
                `;
                container.appendChild(unitEl);
            });

            // Initialize Drag and Drop
            new Sortable(container, {
                handle: '.drag-handle',
                animation: 150,
                ghostClass: 'ghost',
                onEnd: (evt) => {
                    const movedItem = units.splice(evt.oldIndex, 1)[0];
                    units.splice(evt.newIndex, 0, movedItem);
                }
            });
        }

        // --- STATUS EFFECT LOGIC ---
        function showStatusForm(unitId, editIdx = null) {
            const unit = units.find(u => u.id === unitId);
            const isEditing = editIdx !== null;
            const s = isEditing ? unit.statusEffects[editIdx] : { name: '', cause: '', val: 0, dur: 1, type: 'pos' };

            const name = prompt("Status Name:", s.name);
            if (!name) return;
            const val = prompt("HP/Damage Value (Positive Number):", Math.abs(s.val));
            const isPos = confirm("Is this Positive? (OK for +, Cancel for -)");
            const dur = prompt("Duration (Turns):", s.dur);

            const newStatus = {
                name,
                val: isPos ? parseInt(val) : -parseInt(val),
                dur: parseInt(dur),
                cause: ""
            };

            if (isEditing) {
                unit.statusEffects[editIdx] = newStatus;
                logAction(`Edited status on ${unit.name}`);
            } else {
                unit.statusEffects.push(newStatus);
                logAction(`Applied ${name} to ${unit.name}`);
            }
            render();
        }

        // --- UNIT HELPERS ---
        window.toggleUnit = (id) => {
            const unit = units.find(u => u.id === id);
            unit.isOpen = !unit.isOpen;
            render();
        };

        window.updateUnit = (id, field, val) => {
            const unit = units.find(u => u.id === id);
            unit[field] = field === 'name' ? val : parseInt(val);
            logAction(`Updated ${field} for ${unit.name}`);
            render();
        };

        window.deleteUnit = (id) => {
            const unit = units.find(u => u.id === id);
            units = units.filter(u => u.id !== id);
            logAction(`Deleted Unit: ${unit.name}`);
            render();
        };

        window.duplicateStatus = (unitId, sIdx) => {
            const unit = units.find(u => u.id === unitId);
            unit.statusEffects.push({...unit.statusEffects[sIdx]});
            logAction(`Duplicated status on ${unit.name}`);
            render();
        };

        window.deleteStatus = (unitId, sIdx) => {
            const unit = units.find(u => u.id === unitId);
            unit.statusEffects.splice(sIdx, 1);
            logAction(`Removed status from ${unit.name}`);
            render();
        };

        // --- HISTORY HELPERS ---
        function updateHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = history.map((h, i) => `
                <div class="flex items-start gap-2 text-xs border-b pb-1 border-gray-100">
                    <input type="checkbox" onchange="history[${i}].selected = this.checked">
                    <span class="text-gray-600">${h.text}</span>
                </div>
            `).join('');
        }

        window.clearHistory = () => { history = []; updateHistory(); };
        window.deleteSelectedHistory = () => {
            history = history.filter(h => !h.selected);
            updateHistory();
        };

        window.changeGlobalTurn = (val) => {
            const input = document.getElementById('globalTurn');
            input.value = parseInt(input.value) + val;
            logAction(`Global Turn set to ${input.value}`);
        };

        // --- RESIZABLE SIDEBAR LOGIC ---
        const sidebar = document.getElementById("sidebar");
        const dragMe = document.getElementById("dragMe");
        let isResizing = false;

        dragMe.addEventListener("mousedown", (e) => { isResizing = true; });
        document.addEventListener("mousemove", (e) => {
            if (!isResizing) return;
            const newWidth = window.innerWidth - e.clientX;
            if (newWidth > 200 && newWidth < 600) {
                sidebar.style.width = `${newWidth}px`;
            }
        });
        document.addEventListener("mouseup", () => { isResizing = false; });

        // Initial Render
        render();
    </script>
</body>
</html>
